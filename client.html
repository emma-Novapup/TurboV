<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | TurboV Hosting</title>
    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.95)), url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            color: white; margin: 0; padding: 20px;
        }

        .portal-wrapper { max-width: 1000px; margin: 40px auto; }
        
        .card { 
            background: var(--card); 
            backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            margin-bottom: 25px; 
        }

        h1, h2 { color: var(--primary); margin-top: 0; }

        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .invoice-table th { text-align: left; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .invoice-table td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-paid { color: #10b981; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 5px; }
        .status-pending { color: #f59e0b; font-weight: bold; background: rgba(245, 158, 11, 0.1); padding: 4px 8px; border-radius: 5px; }

        .btn-view { 
            padding: 6px 15px; 
            background: rgba(56, 189, 248, 0.1); 
            border: 1px solid var(--primary); 
            color: var(--primary); 
            border-radius: 6px; 
            text-decoration: none; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }
        .btn-view:hover { background: var(--primary); color: #0f172a; }

        .logout-btn { 
            background: transparent; 
            border: 1px solid #ef4444; 
            color: #ef4444; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .logout-btn:hover { background: #ef4444; color: white; }

        #auth-loader { text-align: center; margin-top: 100px; font-size: 1.2rem; color: var(--primary); }
    </style>
</head>
<body>

    <div class="portal-wrapper">
        <div id="auth-loader">Initializing Secure Session...</div>

        <div id="main-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Welcome, <span id="client-name">Client</span></h1>
                <div style="display: flex; gap: 15px;">
                    <a href="index.html" class="btn-view" style="padding: 10px 20px;">Home</a>
                    <button onclick="logout()" class="logout-btn">Sign Out</button>
                </div>
            </div>

            <div class="card" style="border-left: 5px solid #f59e0b;">
                <h2>Total Amount Owed</h2>
                <p id="total-owed" style="font-size: 2.5rem; font-weight: bold; color: #f59e0b; margin: 10px 0;">$0.00</p>
                <p style="color: #94a3b8; font-size: 0.9rem;">Please settle any pending invoices to avoid service interruption.</p>
            </div>

            <div class="card">
                <h2>Invoices & Billing</h2>
                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="invoice-list">
                        <tr>
                            <td colspan="5" style="text-align:center; padding: 40px; color: #94a3b8;">
                                Loading invoices...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsVPJShswSyxcGUJoVN1sBLQzhOg6gcIc",
            authDomain: "turbov-b8dfd.firebaseapp.com",
            projectId: "turbov-b8dfd",
            storageBucket: "turbov-b8dfd.firebasestorage.app",
            messagingSenderId: "102648318166",
            appId: "1:102648318166:web:869bb318eba8db51dae177",
            measurementId: "G-VS3X9ENLND"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('client-name').innerText = user.displayName || "User";
                loadInvoices(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadInvoices(uid) {
            const invoiceList = document.getElementById('invoice-list');
            const totalDisplay = document.getElementById('total-owed');
            
            // FIXED: Changed "userId" to "userid" to match your Firestore screenshot
            db.collection("invoices").where("userid", "==", uid).get()
            .then((querySnapshot) => {
                invoiceList.innerHTML = "";
                let totalOwed = 0;

                if (querySnapshot.empty) {
                    invoiceList.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 20px;'>No invoices found.</td></tr>";
                    totalDisplay.innerText = "$0.00";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Add to total if NOT paid
                    if (data.status !== "PAID") {
                        totalOwed += parseFloat(data.amount || 0);
                    }

                    // FIXED: Changed fields to match your DB (invoice_no, date, amount, status, invoice)
                    const row = `
                        <tr>
                            <td>${data.invoice_no || '---'}</td>
                            <td>${data.date || '---'}</td>
                            <td>$${data.amount || '0.00'}</td>
                            <td><span class="${data.status === 'PAID' ? 'status-paid' : 'status-pending'}">${data.status || 'PENDING'}</span></td>
                            <td><a href="${data.invoice || '#'}" target="_blank" class="btn-view">Download</a></td>
                        </tr>
                    `;
                    invoiceList.innerHTML += row;
                });

                totalDisplay.innerText = "$" + totalOwed.toFixed(2);
            })
            .catch((error) => {
                console.error("Error fetching invoices: ", error);
                invoiceList.innerHTML = "<tr><td colspan='5' style='text-align:center; color: #ef4444;'>Error loading data.</td></tr>";
            });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
