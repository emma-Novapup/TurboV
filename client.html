<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | TurboV Hosting</title>
    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.95)), url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            color: white; margin: 0; padding: 20px;
        }
        .portal-wrapper { max-width: 900px; margin: 40px auto; }
        .card { background: var(--card); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.2); margin-bottom: 20px; }
        h1, h2 { color: var(--primary); }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .invoice-table th { text-align: left; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .invoice-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-paid { color: #10b981; font-weight: bold; }
        .status-pending { color: #f59e0b; font-weight: bold; }
        .btn-view { padding: 5px 12px; background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); color: var(--primary); border-radius: 5px; text-decoration: none; font-size: 0.8rem; }
        .logout-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div class="portal-wrapper">
        <div id="auth-check" style="text-align: center; padding-top: 100px;">
            <p>Verifying session...</p>
        </div>

        <div id="main-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Welcome, <span id="client-name">Client</span></h1>
                <button onclick="logout()" class="logout-btn">Sign Out</button>
            </div>

            <div class="card">
                <h2>Active Services</h2>
                <p style="color: #94a3b8;">You currently have 1 active Bot Starter subscription.</p>
            </div>

            <div class="card">
                <h2>Invoices & Billing</h2>
                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="invoice-list">
                        <tr>
                            <td>#TV-9901</td>
                            <td>May 04, 2026</td>
                            <td>$1.49</td>
                            <td><span class="status-paid">PAID</span></td>
                            <td><a href="#" class="btn-view">Download PDF</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsVPJShswSyxcGUJoVN1sBLQzhOg6gcIc",
            authDomain: "turbov-b8dfd.firebaseapp.com",
            projectId: "turbov-b8dfd",
            storageBucket: "turbov-b8dfd.firebasestorage.app",
            messagingSenderId: "102648318166",
            appId: "1:102648318166:web:869bb318eba8db51dae177",
            measurementId: "G-VS3X9ENLND"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-check').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('client-name').innerText = user.displayName || "Client";
            } else {
                // If not logged in, send them to the login page
                window.location.href = "login.html";
            }
        });

        function logout() { auth.signOut().then(() => { window.location.href = "index.html"; }); }
    </script>
</body>
</html>
