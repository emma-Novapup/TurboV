<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboV Hosting | Discord Bot & VPS Solutions</title>
    
    <meta name="description" content="TurboV Hosting offers high-performance Discord Bot hosting and VPS solutions.">
    <link rel="icon" type="image/png" href="TurboVlogo2.png">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), 
                        url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; 
            margin: 0; 
            line-height: 1.6; 
        }

        /* Hero Section */
        .hero { padding: 60px 20px 20px 20px; text-align: center; }
        h1 { font-size: 3.5rem; color: var(--primary); margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 5px 15px; background: #059669; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; }
        
        /* Navigation & Social Bar */
        .social-bar { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 40px; 
            padding: 0 20px;
            position: relative; 
            flex-wrap: wrap; 
        }

        .social-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--card); border: 1px solid rgba(51, 65, 85, 0.5);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(10px); text-decoration: none;
        }
        .social-btn img { width: 60%; height: 60%; object-fit: contain; }

        .glass-link-btn {
            padding: 10px 25px; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 20px; color: var(--primary); text-decoration: none; font-weight: bold;
            font-size: 0.9rem; backdrop-filter: blur(10px); transition: 0.3s; display: flex;
            align-items: center; justify-content: center; height: 50px; box-sizing: border-box;
        }
        .glass-link-btn:hover { background: var(--primary); color: #0f172a; transform: translateY(-2px); }
        
        /* Login/Profile Container (Right Aligned) */
        .auth-container { 
            position: absolute;
            right: 20px;
            display: flex;
            align-items: center;
        }

        .login-btn { 
            border: 1px solid var(--primary); 
            background: rgba(56, 189, 248, 0.1); 
        }

        #user-profile {
            display: none;
            align-items: center;
            gap: 12px;
            background: var(--card);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
            height: 50px;
            box-sizing: border-box;
        }

        .logout-link {
            color: #ef4444;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .auth-container { position: static; order: 5; margin-top: 10px; }
            .social-bar { justify-content: center; }
        }

        /* Store Layout */
        .store-container { display: flex; justify-content: center; align-items: stretch; gap: 25px; max-width: 1300px; margin: 0 auto 40px auto; padding: 0 20px; flex-wrap: wrap; }
        .card { background: var(--card); backdrop-filter: blur(12px); padding: 40px 25px; border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); transition: 0.3s; text-align: center; width: 280px; display: flex; flex-direction: column; box-sizing: border-box; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn { background: var(--primary); color: #0f172a; padding: 14px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-top: auto; border: none; transition: 0.3s; }
        
        /* Floating Support Button */
        .floating-ticket-btn { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: #0f172a; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4); z-index: 999; }
        
        footer { padding: 40px; text-align: center; border-top: 1px solid rgba(51, 65, 85, 0.3); color: #94a3b8; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="status-badge">● Systems Operational</div>
        <h1>TurboV Hosting</h1>
        <p>Premium Discord Bot Hosting & Enterprise VPS Specs.</p>
    </section>

    <div class="social-bar">
        <a href="https://www.instagram.com/turbovhosting/" target="_blank" class="social-btn"><img src="instagramlogo.png" alt="Instagram"></a>
        <a href="https://x.com/TurboV_hosting" target="_blank" class="social-btn"><img src="whitelogo.png" alt="X"></a>
        
        <a href="faq.html" class="glass-link-btn">FAQ</a>
        <a href="tos.html" class="glass-link-btn">TOS</a>

        <div class="auth-container">
            <a href="login.html" id="login-nav-btn" class="glass-link-btn login-btn">Log In</a>
            
            <div id="user-profile">
                <span id="nav-user-name" style="font-weight: bold; color: var(--primary); font-size: 0.9rem;"></span>
                <a onclick="logout()" class="logout-link">Logout</a>
            </div>
        </div>
    </div>

    <div class="store-container">
        <div class="card">
            <div style="font-size: 2.5rem; margin-bottom: 20px;">🤖</div>
            <h3>Bot Starter</h3>
            <p style="font-size: 1.8rem; font-weight: bold; margin: 10px 0;">$1.49 /mo</p>
            <a href="https://discord.gg/WRM3TM9WAw" class="btn">Select Plan</a>
        </div>

        <div class="card">
            <div style="font-size: 2.5rem; margin-bottom: 20px;">🌐</div>
            <h3>Cloud-V1 VPS</h3>
            <p style="font-size: 1.8rem; font-weight: bold; margin: 10px 0;">$4.50 /mo</p>
            <a href="https://discord.gg/WRM3TM9WAw" class="btn">Select Plan</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TurboV Hosting | <a href="tos.html">TOS</a></p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsVPJShswSyxcGUJoVN1sBLQzhOg6gcIc",
            authDomain: "turbov-b8dfd.firebaseapp.com",
            projectId: "turbov-b8dfd",
            storageBucket: "turbov-b8dfd.firebasestorage.app",
            messagingSenderId: "102648318166",
            appId: "1:102648318166:web:869bb318eba8db51dae177",
            measurementId: "G-VS3X9ENLND"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            const loginBtn = document.getElementById('login-nav-btn');
            const userProfile = document.getElementById('user-profile');
            const userNameSpan = document.getElementById('nav-user-name');

            if (user) {
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userNameSpan.innerText = user.displayName;
            } else {
                loginBtn.style.display = 'flex';
                userProfile.style.display = 'none';
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
