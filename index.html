<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboV Hosting | Discord Bot & VPS Solutions</title>
    
    <meta name="description" content="TurboV Hosting offers high-performance Discord Bot hosting and VPS solutions.">
    <link rel="icon" type="image/png" href="TurboVlogo2.png">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), 
                        url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; 
            margin: 0; 
            line-height: 1.6; 
        }

        /* Hero */
        .hero { padding: 60px 20px 20px 20px; text-align: center; }
        h1 { font-size: 3.5rem; color: var(--primary); margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 5px 15px; background: #059669; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; }
        
        /* Social & Navigation Bar */
        .social-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .social-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--card); border: 1px solid rgba(51, 65, 85, 0.5);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(10px); text-decoration: none;
        }
        .social-btn img { width: 60%; height: 60%; object-fit: contain; }

        .glass-link-btn {
            padding: 10px 25px; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 20px; color: var(--primary); text-decoration: none; font-weight: bold;
            font-size: 0.9rem; backdrop-filter: blur(10px); transition: 0.3s; display: flex;
            align-items: center; justify-content: center; height: 50px; box-sizing: border-box;
        }
        .glass-link-btn:hover { background: var(--primary); color: #0f172a; transform: translateY(-2px); }

        /* Store Layout */
        .store-container { display: flex; justify-content: center; align-items: stretch; gap: 30px; max-width: 1200px; margin: 0 auto 40px auto; padding: 0 20px; flex-wrap: wrap; }
        .discord-integration-box { background: var(--card); backdrop-filter: blur(12px); padding: 10px; border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); width: 320px; height: 500px; box-sizing: border-box; }
        .discord-integration-box iframe { width: 100%; height: 100%; border-radius: 12px; }
        
        .card { background: var(--card); backdrop-filter: blur(12px); padding: 40px 30px; border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); transition: 0.3s; text-align: center; width: 320px; display: flex; flex-direction: column; box-sizing: border-box; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn { background: var(--primary); color: #0f172a; padding: 14px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-top: auto; border: none; }
        
        /* Specialized Sections */
        .fivem-banner { background: var(--card); backdrop-filter: blur(12px); padding: 15px 30px; border-radius: 15px; border: 1px solid rgba(51, 65, 85, 0.5); max-width: 1020px; width: calc(100% - 40px); display: flex; align-items: center; justify-content: center; gap: 20px; text-decoration: none; margin: 0 auto 40px auto; color: white; }
        
        .nimora-section, .about-section { max-width: 1020px; width: calc(100% - 40px); margin: 20px auto 60px auto; padding: 30px; background: var(--card); backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); text-align: center; }
        .nimora-section h2, .about-section h2 { margin: 0 0 10px 0; font-size: 2.2rem; color: var(--primary); }
        
        .about-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; text-align: left; margin-top: 30px; }
        .about-item h3 { color: var(--primary); }

        .glass-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px; color: white; font-weight: bold; transition: 0.3s; width: 180px; box-sizing: border-box; }

        /* Floating Support Ticket Button & Modal */
        .floating-ticket-btn { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: #0f172a; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4); z-index: 999; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); border: 1px solid var(--primary); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: #94a3b8; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--primary); font-size: 0.9rem; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 10px; color: white; box-sizing: border-box; font-family: inherit; }
        .submit-ticket-btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        footer { padding: 40px; text-align: center; border-top: 1px solid rgba(51, 65, 85, 0.3); color: #94a3b8; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="status-badge">● Systems Operational</div>
        <h1>TurboV Hosting</h1>
        <p>Premium Discord Bot Hosting & Enterprise VPS Specs.</p>
    </section>

        <a href="https://www.instagram.com/turbovhosting/" target="_blank" class="social-btn"><img src="instagramlogo.png" alt="Instagram"></a>
