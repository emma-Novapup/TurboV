<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TurboV Hosting | Web Development & Design</title>
    <meta name="description" content="Professional web development, custom design, and high-performance hosting solutions by TurboV.">
    <meta name="keywords" content="TurboV, Web Development, Web Design, Hosting, VPS">

    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
        }
        nav { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(56, 189, 248, 0.1); }
        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 40px; height: 40px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 4rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; color: #94a3b8; }
        
        .btn-main { background: var(--primary); color: #0f172a; padding: 12px 35px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="TurboVlogo2.png" alt="TurboV Logo" class="logo-img">

        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="login.html">Client Area</a>
        </div>
    </nav>

    <header class="hero">
        <h1>TurboV Hosting</h1>
        <p>Premium Hosting and High-Performance Solutions.</p>
        <a href="login.html" class="btn-main">Get Started</a>
    </header>

</body>
</html>
