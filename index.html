<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboV Hosting | Discord Bot & VPS Solutions</title>
    
    <meta name="description" content="TurboV Hosting offers high-performance Discord Bot hosting and VPS solutions.">
    <link rel="icon" type="image/png" href="TurboVlogo2.png">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), 
                        url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--primary); 
            margin: 0; 
            line-height: 1.6; 
        }

        h1, h2, h3, p, span, li, label, footer, div, a { color: var(--primary); }

        .client-btn { 
            position: absolute; top: 25px; right: 25px; z-index: 1000; padding: 10px 25px; 
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); 
            border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.9rem; 
            backdrop-filter: blur(10px); transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; height: 45px; box-sizing: border-box;
        }
        .client-btn:hover { background: var(--primary); color: #0f172a !important; transform: translateY(-2px); }

        .hero { padding: 60px 20px 20px 20px; text-align: center; }
        h1 { font-size: 3.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 5px 15px; background: rgba(5, 150, 105, 0.2); border: 1px solid #059669; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; }
        
        .social-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; padding: 0 20px; flex-wrap: wrap; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.3); display: flex; align-items: center; justify-content: center; transition: 0.3s; backdrop-filter: blur(10px); text-decoration: none; }
        .social-btn:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); transform: translateY(-2px); }
        
        .social-btn img { width: 24px; height: 24px; object-fit: contain; filter: brightness(0) saturate(100%) invert(71%) sepia(34%) hue-rotate(175deg) brightness(101%) contrast(98%); }
        
        /* Fixed Instagram Logo styling - No Filter */
        .social-btn img.insta-fix { filter: none !important; width: 28px; height: 28px; }

        .glass-link-btn { padding: 0 25px; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; backdrop-filter: blur(10px); transition: 0.3s; display: flex; align-items: center; justify-content: center; height: 50px; box-sizing: border-box; }
        .glass-link-btn:hover { border-color: var(--primary); transform: translateY(-2px); }

        .store-container { display: flex; justify-content: center; align-items: stretch; gap: 25px; max-width: 1300px; margin: 0 auto 40px auto; padding: 0 20px; flex-wrap: wrap; }
        .discord-integration-box { background: var(--card); backdrop-filter: blur(12px); padding: 10px; border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); width: 280px; height: 500px; box-sizing: border-box; }
        
        .card { background: var(--card); backdrop-filter: blur(12px); padding: 40px 25px; border-radius: 20px; border: 1px solid rgba(51, 65, 85, 0.5); transition: 0.3s; text-align: center; width: 280px; display: flex; flex-direction: column; box-sizing: border-box; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .btn { background: var(--primary); color: #0f172a !important; padding: 14px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-top: auto; border: none; transition: 0.3s; text-align: center; cursor: pointer; }
        
        .fivem-banner { background: var(--card); backdrop-filter: blur(12px); padding: 15px 30px; border-radius: 15px; border: 1px solid rgba(51, 65, 85, 0.5); max-width: 1020px; width: calc(100% - 40px); display: flex; align-items: center; justify-content: center; gap: 20px; text-decoration: none; margin: 0 auto 40px auto; }
        
        .nimora-section { max-width: 1020px; width: calc(100% - 40px); margin: 20px auto 60px auto; padding: 30px; background: rgba(56, 189, 248, 0.1); backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid var(--primary); text-align: center; }
        .nimora-button-container { display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 20px; }
        
        .nimora-discord-btn { width: 240px; height: 50px; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; text-decoration: none; }
        .nimora-web-btn { height: 50px; padding: 0 25px; background: var(--card); border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 12px; display: flex; align-items: center; gap: 10px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        
        .nimora-discord-btn:hover, .nimora-web-btn:hover { border-color: var(--primary); transform: translateY(-2px); background: rgba(56, 189, 248, 0.1); }
        .nimora-discord-btn img, .nimora-web-btn img { height: 24px; width: auto; }

        .about-section { max-width: 1020px; width: calc(100% - 40px); margin: 20px auto 60px auto; padding: 30px; background: rgba(56, 189, 248, 0.1); backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid var(--primary); text-align: center; }

        .floating-ticket-btn { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: #0f172a !important; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4); z-index: 999; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); border: 2px solid var(--primary); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; position: relative; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 10px; color: var(--primary); box-sizing: border-box; outline: none; }

        footer { padding: 40px; text-align: center; border-top: 1px solid rgba(51, 65, 85, 0.3); }
        footer a { text-decoration: none; border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>

    <a href="login.html" class="client-btn">Client Area</a>

    <section class="hero">
        <div class="status-badge">● Systems Operational</div>
        <h1>TurboV Hosting</h1>
        <p>Premium Discord Bot Hosting & Enterprise VPS Specs.</p>
    </section>

    <div class="social-bar">
        <a href="https://www.instagram.com/turbovhosting/" target="_blank" class="social-btn">
            <img src="instagramlogo.png" alt="Instagram" class="insta-fix">
        </a>
        <a href="https://x.com/TurboV_hosting" target="_blank" class="social-btn">
            <img src="whitelogo.png" alt="X">
        </a>
        <a href="https://www.facebook.com/profile.php?id=61589316567656" target="_blank" class="social-btn">
            <img src="facebook.png" alt="Facebook">
        </a>
        <a href="https://emma-novapup.github.io/TurboV/careers.html" class="glass-link-btn">Careers</a>
        <a href="faq.html" class="glass-link-btn">FAQ</a>
        <a href="tos.html" class="glass-link-btn">TOS</a>
    </div>

    <div class="store-container">
        </div>

    <footer><p>&copy; 2026 TurboV Hosting | <a href="tos.html">TOS</a></p></footer>

</body>
</html>
