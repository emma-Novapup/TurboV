<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboV Hosting | Website Moved</title>
    
    <meta name="description" content="TurboV Hosting has moved to a new location.">
    <link rel="icon" type="image/png" href="TurboVlogo2.png">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), 
                              url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--primary); 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .redirect-container {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            max-width: 500px;
            width: calc(100% - 40px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn { 
            background: var(--primary); 
            color: #0f172a !important; 
            padding: 16px 30px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            border: none; 
            transition: 0.3s; 
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }

        .logo-small {
            width: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="redirect-container">
        <!-- If you have the logo file locally, it will appear here -->
        <img src="TurboVlogo2.png" alt="TurboV" class="logo-small">
        
        <h1>Sorry!</h1>
        <p>Our website has been moved to a new address to provide a better experience.</p>
        
        <a href="https://turbov-hosting.github.io/TurboV/index.html#" class="btn">
            Go to New Website
        </a>

        <div style="margin-top: 25px; font-size: 0.8rem; opacity: 0.5;">
            Redirecting you to TurboV Hosting...
        </div>
    </div>

</body>
</html>
