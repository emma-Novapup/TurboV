<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ... (Previous Styles) ... */

        /* Updated Nimora Section Container */
        .nimora-section { 
            max-width: 1020px; 
            width: calc(100% - 40px); 
            margin: 20px auto 60px auto; 
            padding: 30px; 
            background: var(--card); 
            backdrop-filter: blur(12px); 
            border-radius: 20px; 
            border: 1px solid rgba(51, 65, 85, 0.5); 
            text-align: center; 
        }

        /* Set specific width for the button container */
        .nimora-button-container {
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin: 20px auto 0 auto; 
            width: 240px; /* Fixed width as requested */
        }

        .glass-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center; /* Center icon when text is gone */
            gap: 10px;
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            min-width: 50px; /* Ensure a good clickable area */
        }
        .glass-btn:hover { border-color: var(--primary); transform: translateY(-2px); background: rgba(56, 189, 248, 0.1); }
        .glass-btn img { height: 20px; width: auto; }

        /* ... (Remaining Styles) ... */
    </style>
</head>
<body>

    <div class="nimora-section">
        <h2>NimoraNode</h2>
        <p>PREMIUM GAME HOSTING PARTNER</p>
        
        <div class="nimora-button-container">
            <a href="https://discord.com/invite/nimoranode" target="_blank" class="glass-btn">
                <img src="discordlogo.png" alt="Discord">
            </a>
            
            <a href="https://nimoranode.com" target="_blank" class="glass-btn">
                <img src="nimora.gif" alt="Nimora">
                <span>Website</span>
            </a>
        </div>
        
        <div style="font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 15px; font-style: italic;">
            NimoraNode is not partnered with TurboV
        </div>
    </div>

    </body>
</html>
