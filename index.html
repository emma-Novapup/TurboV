<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TurboV | Web Development & Professional Web Design</title>
    <meta name="description" content="TurboV provides professional web development, custom design, and high-performance hosting solutions. Build your brand with our expert services.">
    <meta name="keywords" content="TurboV, Web Development, Web Design, Hosting, VPS, Custom Websites">

    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
        }
        nav { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(56, 189, 248, 0.1); }
        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 40px; height: 40px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 4rem; margin-bottom: 10px; } /* Original Size */
        .hero p { font-size: 1.2rem; color: #94a3b8; max-width: 700px; }
        
        .btn-main { background: var(--primary); color: #0f172a; padding: 12px 35px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 25px; transition: 0.3s; display: inline-block; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="TurboVlogo2.png" alt="TurboV Logo" class="logo-img">
            <span style="font-size: 1.5rem; font-weight: bold;">TurboV</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="login.html">Client Area</a>
        </div>
    </nav>

    <header class="hero">
        <h1>TurboV Hosting</h1>
        <p>Premium Web Development and High-Performance Solutions.</p>
        <a href="login.html" class="btn-main">Get Started</a>
    </header>

    <div style="padding: 60px 5%; text-align: center;">
        <h2 style="color: var(--primary);">Our Expertise</h2>
        <p style="color: #94a3b8; margin-bottom: 40px;">Professional design and development tailored for you.</p>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
            <div style="background: rgba(30, 41, 59, 0.6); padding: 30px; border-radius: 15px; width: 280px; border: 1px solid rgba(255,255,255,0.05);">
                <h3>Web Design</h3>
                <p style="font-size: 0.9rem; color: #94a3b8;">Sleek, modern, and responsive layouts.</p>
            </div>
            <div style="background: rgba(30, 41, 59, 0.6); padding: 30px; border-radius: 15px; width: 280px; border: 1px solid rgba(255,255,255,0.05);">
                <h3>Development</h3>
                <p style="font-size: 0.9rem; color: #94a3b8;">Custom scripts and full-stack solutions.</p>
            </div>
        </div>
    </div>

</body>
</html>
