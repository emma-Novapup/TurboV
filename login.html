<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TurboV Hosting</title>
    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.95)), url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h2, label, a, input { color: var(--primary) !important; }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: white;
            color: #444 !important;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }
        .google-btn img { height: 20px; }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(56, 189, 248, 0.5);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(56, 189, 248, 0.2);
            margin: 0 10px;
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            color: var(--primary);
        }

        .login-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #0f172a !important; 
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3); }

        .footer-links { margin-top: 20px; font-size: 0.85rem; }
        .footer-links a { text-decoration: none; border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="TurboVlogo2.png" alt="Logo" style="height: 60px; margin-bottom: 20px;">
        <h2>Login</h2>

        <button class="google-btn" id="googleLogin">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
            Sign in with Google
        </button>

        <div class="divider">OR</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-submit">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="index.html">Back to Site</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCsVPJShswSyxcGUJoVN1sBLQzhOg6gcIc",
            authDomain: "turbov-b8dfd.firebaseapp.com",
            projectId: "turbov-b8dfd",
            storageBucket: "turbov-b8dfd.firebasestorage.app",
            messagingSenderId: "102648318166",
            appId: "1:102648318166:web:869bb318eba8db51dae177",
            measurementId: "G-VS3X9ENLND"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Email/Password Login
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    window.location.href = "client.html";
                })
                .catch((error) => {
                    alert("Login failed: " + error.message);
                });
        });

        // Google Login
        const googleBtn = document.getElementById('googleLogin');
        googleBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    window.location.href = "client.html";
                }).catch((error) => {
                    alert("Google sign-in failed: " + error.message);
                });
        });
    </script>
</body>
</html>
