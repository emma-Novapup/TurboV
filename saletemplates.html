<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Template | TurboV Hosting</title>
    <link rel="icon" type="image/png" href="TurboVlogo2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bright-blue: #00d2ff; /* New High-Visibility Blue */
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.9);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --discord: #5865F2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                url('./TurboV.png');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .template-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .preview-img {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            margin-bottom: 25px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: block;
        }

        .price-display {
            margin: 20px 0;
        }

        .price-display .amount {
            font-size: 4rem;
            font-weight: 800;
            color: white;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* LIVE DEMO BUTTON */
        .btn-view {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* DISCORD BUTTON */
        .btn-buy {
            background: var(--discord);
            color: #fff;
        }

        /* UPDATED: BRIGHT BLUE BACK BUTTON */
        .btn-home {
            background: var(--bright-blue);
            color: #0f172a; /* Dark text for readability on bright blue */
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            border: none;
        }

        .btn-home:hover {
            background: #fff;
            color: #00d2ff;
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 30px 0;
            text-align: left;
        }

        .feature-list li {
            color: var(--text-dim);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="template-card">
            <img src="website.png" alt="Template Preview" class="preview-img">
            
            <h2 style="margin: 0; font-size: 1.6rem; color: #fff;">Ultimate Hosting Layout</h2>
            
            <div class="price-display">
                <span class="amount">$5</span><span style="color: var(--text-dim); margin-left: 5px;">USD</span>
            </div>

            <ul class="feature-list">
                <li style="display: flex; align-items: center;"><span style="color:var(--bright-blue); margin-right:10px;">✦</span> Fully Responsive HTML5/CSS3</li>
                <li style="display: flex; align-items: center;"><span style="color:var(--bright-blue); margin-right:10px;">✦</span> TurboV Dark Mode Styling</li>
            </ul>

            <div class="btn-container">
                <a href="https://turbov-hosting.github.io/templatewebsite/index.html" target="_blank" class="btn btn-view">View Live Demo</a>
                <a href="https://discord.gg/YOUR_DISCORD_LINK" target="_blank" class="btn btn-buy">Purchase via Discord</a>
                
                <a href="index.html" class="btn btn-home">Return to Main Site</a>
            </div>
        </div>
    </div>

</body>
</html>
